<div class="car-card" (click)="onImageClick()" style="cursor: pointer; border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 8px;">
  <h2>{{ car?.title }}</h2>
  <p><strong>Brand:</strong> {{ car?.creator }}</p>
  <p>{{ car?.description }}</p>
  <span class="type-tag">{{ car?.type }}</span>
</div>
